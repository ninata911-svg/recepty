<!doctype html>
<html lang="ru" itemscope itemtype="https://schema.org/Recipe">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Рецепт — Домашняя книга рецептов</title>
  <meta
    id="page-description"
    name="description"
    content="Рецепт из домашней книги"
  >

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap">
  <link rel="stylesheet" href="/assets/css/styles.css">

  <style>
    .admin-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-top: 20px;
    }

    .secondary-button,
    .danger-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font: inherit;
      font-weight: 850;
      cursor: pointer;
      text-decoration: none;
    }

    .secondary-button {
      background: var(--soft);
      color: var(--accent-dark);
    }

    .danger-button {
      background: var(--paper);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .danger-button:disabled {
      opacity: .55;
      cursor: wait;
    }
  </style>

  <script
    id="recipe-jsonld"
    type="application/ld+json"
  >{}</script>
</head>

<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="/">
        Домашняя <em>книга рецептов</em>
      </a>

      <div class="header-actions">
        <select
          class="theme-select"
          data-theme-select
          aria-label="Цветовая тема"
        >
          <option value="sage">Шалфей</option>
          <option value="coffee">☕ Кофе</option>
          <option value="sea">Морская</option>
          <option value="cobalt">Кобальт</option>
          <option value="cherry">❤️ Вишня</option>
          <option value="plum">Сливовая</option>
          <option value="turquoise">Бирюза</option>
          <option value="lilac">Сиреневая</option>
          <option value="dark">Тёмная</option>
        </select>
      </div>
    </div>
  </header>

  <main class="recipe-shell">
    <a class="back" href="/">← Все рецепты</a>

    <p id="recipe-loading">Загружаем рецепт…</p>

    <section
      id="recipe-error"
      class="block"
      hidden
    >
      <h1>Рецепт не найден</h1>
      <p id="recipe-error-text">
        Не удалось загрузить карточку рецепта.
      </p>
      <p><a href="/">Вернуться в каталог</a></p>
    </section>

    <article id="recipe-content" hidden>
      <img
        id="recipe-cover"
        class="cover"
        itemprop="image"
        alt=""
        hidden
      >

      <section class="recipe-head">
        <p id="recipe-category" class="kicker"></p>

        <h1 id="recipe-title" itemprop="name"></h1>

        <p
          id="recipe-description"
          class="lead"
          itemprop="description"
        ></p>

        <div id="recipe-meta" class="recipe-meta"></div>

        <div id="recipe-tags" class="recipe-tags"></div>
      </section>

      <section id="ingredients-block" class="block">
        <h2>Ингредиенты</h2>
        <div id="ingredients"></div>
      </section>

      <section id="steps-block" class="block">
        <h2>Приготовление</h2>
        <div id="steps"></div>
      </section>

      <section id="tips-block" class="block" hidden>
        <h2>Хитрости</h2>
        <div id="tips"></div>
      </section>

      <section id="serve-block" class="block" hidden>
        <h2>С чем подавать</h2>
        <div id="serve-with"></div>
      </section>

      <section id="highlight-block" class="block highlight" hidden>
        <h2>Изюминка</h2>
        <p id="highlight"></p>
      </section>

      <section id="batch-block" class="block" hidden>
        <h2>Что приготовить заранее</h2>
        <p id="batch-tip"></p>
      </section>

      <section id="notes-block" class="block" hidden>
        <h2>Заметки</h2>
        <p id="notes"></p>
      </section>

      <section id="nutrition-block" class="block" hidden>
        <h2>Пищевая ценность</h2>
        <p id="nutrition-basis"></p>

        <div id="nutrition" class="nutrition"></div>
      </section>

      <section id="source-block" class="block" hidden>
        <h2>Источник</h2>
        <p id="source"></p>
      </section>
    </article>

    <div id="edit-recipe-wrap" class="admin-actions" hidden>
      <a
        id="edit-recipe-link"
        class="secondary-button"
        href="/admin"
      >Редактировать</a>
      <button
        id="delete-recipe-button"
        class="danger-button"
        type="button"
        hidden
      >Удалить рецепт</button>
    </div>
  </main>

  <script>
    (function () {
      if (sessionStorage.getItem("receptyAdminKey")) {
        var wrap = document.getElementById("edit-recipe-wrap");
        var link = document.getElementById("edit-recipe-link");
        var deleteButton = document.getElementById("delete-recipe-button");
        var slug = new URLSearchParams(window.location.search).get("slug");
        if (wrap && link && slug) {
          link.href = "/admin?edit=" + encodeURIComponent(slug);
          wrap.hidden = false;
          link.addEventListener("click", function (event) {
            event.preventDefault();
            window.location.href =
              "/admin?edit=" + encodeURIComponent(slug);
          });
          if (deleteButton) {
            deleteButton.hidden = false;
            deleteButton.addEventListener("click", function () {
              if (!slug) return;
              var ok = window.confirm(
                "Удалить этот рецепт? Карточка будет скрыта из каталога, фотография останется в хранилище."
              );
              if (!ok) return;

              deleteButton.disabled = true;
              var originalText = deleteButton.textContent;
              deleteButton.textContent = "Удаляем…";

              fetch(
                "/api/admin/recipes/" + encodeURIComponent(slug),
                {
                  method: "DELETE",
                  headers: {
                    Accept: "application/json",
                    Authorization:
                      "Bearer " + sessionStorage.getItem("receptyAdminKey"),
                  },
                }
              )
                .then(function (response) {
                  if (response.status === 401) {
                    sessionStorage.removeItem("receptyAdminKey");
                    throw new Error(
                      "Срок режима редактора закончился. Войдите снова."
                    );
                  }
                  return response.json().then(function (data) {
                    if (!response.ok || !data.success) {
                      throw new Error(
                        data.message ||
                        data.error ||
                        "Не удалось удалить рецепт."
                      );
                    }
                    window.location.href = "/";
                  });
                })
                .catch(function (error) {
                  deleteButton.disabled = false;
                  deleteButton.textContent = originalText;
                  window.alert(
                    error && error.message
                      ? error.message
                      : "Не удалось удалить рецепт."
                  );
                });
            });
          }
        }
      }
    })();
  </script>

  <script src="/assets/js/theme.js"></script>
  <script type="module" src="/assets/js/recipe.js"></script>
</body>
</html>
